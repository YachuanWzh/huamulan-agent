# langgraph-claw CI Pipeline

when:
  branch: [master, main]
  event: [push, pull_request, manual]

# 全局环境变量（CI 专用，非敏感值）
variables:
  PYTHONUNBUFFERED: "1"

steps:
  # ─── Backend ───
  lint-backend:
    image: python:3.12-slim
    environment:
      PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      UV_DEFAULT_INDEX: https://mirrors.aliyun.com/pypi/simple/
    commands:
      - pip install --quiet uv
      - cd backend
      - uv pip install --system ruff
      - ruff check src/ tests/

  test-backend:
    image: python:3.12-slim
    environment:
      PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      UV_DEFAULT_INDEX: https://mirrors.aliyun.com/pypi/simple/
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/test
      LLM_MODEL: test-model
      OTEL_JAEGER_API_URL: http://jaeger.test/api
      OTEL_PROMETHEUS_PROXY_URL: http://prometheus.test/api/v1
    commands:
      - pip install --quiet uv
      - cd backend
      - uv pip install --system -e ".[dev]"
      - python -m pytest -v -m "not integration" --timeout=120

  # ─── Frontend ───
  lint-frontend:
    image: node:22-alpine
    directory: frontend
    commands:
      - npm ci
      - npm run lint

  typecheck-frontend:
    image: node:22-alpine
    directory: frontend
    commands:
      - npm ci
      - npx tsc --noEmit

  test-frontend:
    image: node:22-alpine
    directory: frontend
    commands:
      - npm ci
      - npm test -- --maxWorkers=1

  build-frontend:
    image: node:22-alpine
    directory: frontend
    commands:
      - npm ci
      - npm run build

  # ─── Smoke Eval ───
  # 使用 DeepSeek LLM 做路由评估；需在 Woodpecker Secrets 中配置 openai_api_key
  smoke-eval:
    image: python:3.12-slim
    when:
      path:
        include: ["backend/**", ".woodpecker.yml"]
        exclude: ["*.md", "docs/**"]
    environment:
      LLM_BASE_URL: https://api.deepseek.com
      LLM_MODEL: deepseek-chat
      SKILL_EMBEDDING_URL: http://192.168.5.107:11434
      OPENAI_API_KEY:
        from_secret: openai_api_key
    commands:
      - pip install --quiet uv
      - cd backend
      - uv pip install --system -e ".[dev]"
      - |
        uv run python -m personal_assistant.skills.evaluation \
          --skills-dir src/personal_assistant/skills \
          --golden evaluation/golden/otel_routing.jsonl \
          --llm-base-url "$LLM_BASE_URL" \
          --llm-model "$LLM_MODEL" \
          --output-md ../eval-report.md
      - echo "=== Smoke Eval Report ==="
      - cat ../eval-report.md
