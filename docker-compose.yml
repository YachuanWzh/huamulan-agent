# =============================================================================
# langgraph-claw Docker deployment
# =============================================================================
# Start everything:
#   docker compose up -d
#
# View logs:
#   docker compose logs -f
#
# Rebuild after code changes:
#   docker compose up -d --build
# =============================================================================

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-langgraph_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # ---- Database ----
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-langgraph_db}
      # ---- Redis ----
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: "${CACHE_ENABLED:-true}"
      # ---- CORS ----
      CORS_ORIGINS: '["http://localhost"]'
      # ---- LLM (required) ----
      OPENAI_API_KEY: ${OPENAI_API_KEY:?err - set OPENAI_API_KEY in .env.docker}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.2}"
      # ---- Skill routing (semantic / rerank need Ollama, disabled by default) ----
      SKILL_ROUTING_SEMANTIC_ENABLED: "${SKILL_ROUTING_SEMANTIC_ENABLED:-false}"
      SKILL_ROUTING_RERANK_ENABLED: "${SKILL_ROUTING_RERANK_ENABLED:-false}"
      # ---- Checkpoint ----
      CHECKPOINT_TTL_SECONDS: "${CHECKPOINT_TTL_SECONDS:-604800}"
      CHECKPOINT_SKIP_NODES: "route_skills,compact_context"
      CHECKPOINT_PG_CLEANUP_ENABLED: "${CHECKPOINT_PG_CLEANUP_ENABLED:-true}"
      # ---- Knowledge RAG (disabled by default) ----
      KNOWLEDGE_RAG_ENABLED: "${KNOWLEDGE_RAG_ENABLED:-false}"
      # ---- OTEL webhook secret ----
      OTEL_ALERT_WEBHOOK_SECRET: ${OTEL_ALERT_WEBHOOK_SECRET:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  # ── Frontend (nginx + SPA) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  postgres_data:
